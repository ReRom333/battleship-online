<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Морской бой онлайн - Расстановка кораблей</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 10px; }
  h2 { text-align: center; }
  .board { display: grid; grid-template-columns: repeat(10, 30px); grid-gap: 2px; margin-bottom: 20px; }
  .cell { width: 30px; height: 30px; background: #cce; border: 1px solid #339; cursor: pointer; user-select: none; }
  .cell.ship { background: #559; }
  #info { margin-bottom: 10px; }
  button, select { margin: 5px 0; padding: 5px 10px; font-size: 16px; }
  #controls { margin-bottom: 15px; }
  #playerBoardContainer, #enemyBoardContainer { margin-bottom: 20px; }
</style>
</head>
<body>

<h2>Морской бой онлайн</h2>

<div id="info">Выберите корабль, ориентацию и поставьте его на доску</div>

<div id="controls">
  Корабль: 
  <select id="shipSelect">
    <option value="4">Крейсер (4)</option>
    <option value="3">Эсминец (3)</option>
    <option value="2">Подводная лодка (2)</option>
    <option value="1">Катер (1)</option>
  </select>

  <button id="orientationBtn">Ориентация: Горизонтально</button>
</div>

<div id="playerBoardContainer">
  <strong>Своя доска</strong>
  <div id="playerBoard" class="board"></div>
</div>

<button id="startGameBtn" disabled>Начать игру</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyATPvyALFcJHnPeiIAt6sDyeFi4nwmnNOU",
    authDomain: "bsrs-1.firebaseapp.com",
    databaseURL: "https://bsrs-1-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "bsrs-1",
    storageBucket: "bsrs-1.firebasestorage.app",
    messagingSenderId: "56393365787",
    appId: "1:56393365787:web:9514aae491938b569ebbbe"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  const BOARD_SIZE = 10;

  // Оставляем корабли для расстановки — у каждого размер и сколько штук
  const shipsToPlace = [
    { size: 4, count: 1 },
    { size: 3, count: 2 },
    { size: 2, count: 3 },
    { size: 1, count: 4 }
  ];

  let playerBoard = document.getElementById('playerBoard');
  let shipSelect = document.getElementById('shipSelect');
  let orientationBtn = document.getElementById('orientationBtn');
  let startGameBtn = document.getElementById('startGameBtn');
  let info = document.getElementById('info');

  let orientation = 'horizontal'; // или 'vertical'
  let placedShips = []; // массив всех поставленных кораблей с позицией и размером

  // Создаем пустую доску
  function createBoard() {
    playerBoard.innerHTML = '';
    for (let i = 0; i < BOARD_SIZE * BOARD_SIZE; i++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.dataset.index = i;
      playerBoard.appendChild(cell);
    }
  }

  createBoard();

  // Проверяем, свободна ли позиция для корабля заданного размера и ориентации
  function canPlaceShip(startIndex, size, orientation) {
    let x = startIndex % BOARD_SIZE;
    let y = Math.floor(startIndex / BOARD_SIZE);

    if (orientation === 'horizontal') {
      if (x + size > BOARD_SIZE) return false;
      for (let i = 0; i < size; i++) {
        if (isCellOccupied(y * BOARD_SIZE + x + i)) return false;
      }
    } else {
      if (y + size > BOARD_SIZE) return false;
      for (let i = 0; i < size; i++) {
        if (isCellOccupied((y + i) * BOARD_SIZE + x)) return false;
      }
    }
    return true;
  }

  // Проверяем, занята ли клетка уже каким-то кораблём
  function isCellOccupied(index) {
    for (const ship of placedShips) {
      if (ship.positions.includes(index)) return true;
    }
    return false;
  }

  // Ставит корабль, обновляет массив placedShips и отрисовывает
  function placeShip(startIndex, size, orientation) {
    let positions = [];
    let x = startIndex % BOARD_SIZE;
    let y = Math.floor(startIndex / BOARD_SIZE);

    if (!canPlaceShip(startIndex, size, orientation)) return false;

    if (orientation === 'horizontal') {
      for (let i = 0; i < size; i++) {
        positions.push(y * BOARD_SIZE + x + i);
      }
    } else {
      for (let i = 0; i < size; i++) {
        positions.push((y + i) * BOARD_SIZE + x);
      }
    }

    placedShips.push({ size, positions });
    drawShips();
    checkAllShipsPlaced();
    return true;
  }

  // Отрисовка всех кораблей на доске
  function drawShips() {
    // Сначала убираем все отметки кораблей
    playerBoard.querySelectorAll('.cell.ship').forEach(c => c.classList.remove('ship'));
    for (const ship of placedShips) {
      for (const pos of ship.positions) {
        setCellClass(playerBoard, pos, 'ship', true);
      }
    }
  }

  function setCellClass(boardElement, index, className, add = true) {
    const cell = boardElement.querySelector(`.cell[data-index='${index}']`);
    if (!cell) return;
    if (add) cell.classList.add(className);
    else cell.classList.remove(className);
  }

  // Проверяем, поставлены ли все корабли нужного количества
  function checkAllShipsPlaced() {
    // Считаем сколько каждого размера поставлено
    let counts = {};
    for (const ship of placedShips) {
      counts[ship.size] = (counts[ship.size] || 0) + 1;
    }
    // Проверяем по shipsToPlace
    for (const shipType of shipsToPlace) {
      if ((counts[shipType.size] || 0) < shipType.count) {
        startGameBtn.disabled = true;
        return;
      }
    }
    startGameBtn.disabled = false;
    info.textContent = "Все корабли расставлены! Можно начать игру.";
  }

  // Обработка клика на доске
  playerBoard.addEventListener('click', e => {
    if (!e.target.classList.contains('cell')) return;
    let idx = +e.target.dataset.index;

    let size = +shipSelect.value;
    if (!placeShip(idx, size, orientation)) {
      alert('Невозможно поставить корабль сюда, выберите другое место.');
    }
  });

  // Переключение ориентации
  orientationBtn.addEventListener('click', () => {
    orientation = (orientation === 'horizontal') ? 'vertical' : 'horizontal';
    orientationBtn.textContent = 'Ориентация: ' + (orientation === 'horizontal' ? 'Горизонтально' : 'Вертикально');
  });

  // Кнопка начать игру
  startGameBtn.addEventListener('click () => {
    alert('Пока это демо расстановки: игра начинается! Следующий этап — логика ходов и стрельбы.');
    // Здесь в будущем будет запуск игры, передача данных в Firebase и т.п.
  });

</script>
</body>
</html>

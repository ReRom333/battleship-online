<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Морський бій з Firebase - покращена версія</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 10px;
  }
  #topControls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    font-weight: bold;
  }
  #topControls input {
    width: 100px;
    font-size: 14px;
    padding: 5px;
  }
  #topControls button {
    padding: 6px 10px;
    font-size: 14px;
    cursor: pointer;
  }
  #roomStatusBox {
    border: 1px solid #33a;
    border-radius: 6px;
    padding: 4px 10px;
    color: #33a;
    font-weight: bold;
    display: inline-block;
    min-width: 120px;
    text-align: center;
  }
  #info {
    margin: 15px auto;
    font-weight: bold;
    font-size: 18px;
    text-align: center;
    max-width: 600px;
  }
  #gameContainer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    margin-top: 10px;
  }
  #shipIconsContainer {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .ship-icon {
    cursor: pointer;
    border: 2px solid transparent;
    user-select: none;
    display: flex;
    height: 22px;
    border-radius: 5px;
    background: #559;
    color: white;
    font-weight: bold;
    align-items: center;
    padding: 0 4px;
  }
  .ship-icon.selected {
    border-color: #33a;
    box-shadow: 0 0 8px #33a;
  }
  .ship-segment {
    border-right: 1px solid rgba(255,255,255,0.7);
    height: 22px;
  }
  .ship-segment:last-child {
    border-right: none;
  }
  .count-icons {
    display: flex;
    gap: 3px;
    margin-left: 6px;
  }
  .count-block {
    width: 9px;
    height: 9px;
    background: #aad;
    border: 1px solid #44a;
    border-radius: 2px;
  }
  #orientationIcons {
    margin-bottom: 10px;
  }
  .orient-icon {
    cursor: pointer;
    width: 30px;
    height: 30px;
    background: #cce;
    color: #339;
    font-weight: bold;
    font-size: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    user-select: none;
    margin-right: 8px;
  }
  .orient-icon.selected {
    border-color: #33a;
    box-shadow: 0 0 8px #33a;
  }
  .orient-icon.orient-horizontal::after {
    content: "⇆";
  }
  .orient-icon.orient-vertical::after {
    content: "⇅";
  }
  #boards {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }
  .boardContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .boardContainer strong {
    margin-bottom: 6px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(10, 24px);
    grid-gap: 1px;
    padding: 3px;
    border-radius: 10px;
    user-select: none;
  }
  #playerBoard {
    background: #c4d9f7;
  }
  #enemyBoard {
    background: #dbeadc;
  }
  .cell {
    width: 24px;
    height: 24px;
    background:e1eaff;
    border: 1px solid #339;
    cursor: pointer;
    position: relative;
  }
  #enemyBoard .cell {
    background: #e9f3e9;
  }
  .cell.ship {
    background: #456aa7;
  }
  .cell.hit {
    background: #f4625f;
  }
  .cell.miss {
    background: #6ea867;
  }
  .cell.sunk {
    box-shadow: inset 0 0 8px 2px #8a1b04;
  }
  .remove-ship {
    position: absolute;
    top: 1px;
    right: 1px;
    width: 16px;
    height: 16px;
    font-size: 14px;
    background: #f33;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    line-height: 16px;
    text-align: center;
    user-select: none;
    z-index: 10;
  }
  #startGameBtn {
    width: 100%;
    font-size: 16px;
    padding: 10px;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 10px;
    background-color: #4a7aff;
    color: white;
    border: none;
  }
  #startGameBtn:disabled {
    background-color: #aaa;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div id="topControls">
  <input id="roomIdInput" placeholder="ID кімнати (4 цифри)" maxlength="4" />
  <button id="createRoomBtn">Створити кімнату</button>
  <button id="joinRoomBtn">Приєднатись</button>
  <div id="roomStatusBox"></div>
</div>

<div id="gameContainer">
  <div id="sidebar">
    <div id="shipIconsContainer"></div>
    <div id="orientationIcons">
      <div class="orient-icon orient-horizontal selected" data-orient="horizontal"></div>
      <div class="orient-icon orient-vertical" data-orient="vertical"></div>
    </div>
    <button id="startGameBtn" disabled>Почати гру</button>
  </div>

  <div id="info" title="Поточний стан гри">Очікуйте дії</div>

  <div id="boards">
    <div class="boardContainer">
      <strong>Ваша дошка</strong>
      <div id="playerBoard" class="board"></div>
    </div>
    <div class="boardContainer">
      <strong>Дошка супротивника</strong>
      <div id="enemyBoard" class="board"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyATPvyALFcJHnPeiIAt6sDyeFi4nwmnNOU",
    authDomain: "bsrs-1.firebaseapp.com",
    databaseURL: "https://bsrs-1-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "bsrs-1",
    storageBucket: "bsrs-1.appspot.com",
    messagingSenderId: "56393365787",
    appId: "1:56393365787:web:9514aae491938b569ebbbe"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const BOARD_SIZE = 10;
  const shipsConfig = {4:1, 3:2, 2:3, 1:4};

  let roomId = null;
  let playerNumber = null; // 1 або 2
  let currentPlayer = null;
  let gameStarted = false;
  let placedShips = [];
  let enemyShips = [];
  let orientation = "horizontal";
  let selectedSize = 4;
  let playerMoves = [];
  let enemyMoves = [];

  const playerBoard = document.getElementById("playerBoard");
  const enemyBoard = document.getElementById("enemyBoard");
  const info = document.getElementById("info");
  const roomStatusBox = document.getElementById("roomStatusBox");
  const roomIdInput = document.getElementById("roomIdInput");
  const createRoomBtn = document.getElementById("createRoomBtn");
  const joinRoomBtn = document.getElementById("joinRoomBtn");
  const startGameBtn = document.getElementById("startGameBtn");
  const shipIconsContainer = document.getElementById("shipIconsContainer");

  // Вищеописані функції createShipIcons, updateCounts, createBoard, isCellOccupied,
  // canPlaceShip, hasNeighbouringShip, drawShips, placeShip, updateStartBtn

  // Объявим их здесь:

  function createShipIcons(){
    shipIconsContainer.innerHTML = "";
    for(let size in shipsConfig){
      size = +size;
      const wrapper = document.createElement("div");
      wrapper.style = "display:flex;gap:6px;align-items:center;cursor:pointer;flex-wrap:nowrap;width:100%";
      const icon = document.createElement("div");
      icon.classList.add("ship-icon");
      if(size === selectedSize) icon.classList.add("selected");
      icon.style.width = (28 * size) + "px";
      icon.style.height = "25px";
      icon.dataset.size = size;
      icon.style.display = "flex";
      for(let i=0; i<size; i++){
        const seg = document.createElement("div");
        seg.classList.add("ship-segment");
        icon.appendChild(seg);
      }
      const countDiv = document.createElement("div");
      countDiv.classList.add("count-icons");
      countDiv.id = `count-${size}`;
      countDiv.style.marginTop = "0";
      wrapper.appendChild(icon);
      wrapper.appendChild(countDiv);
      shipIconsContainer.appendChild(wrapper);

      icon.addEventListener("click", () => {
        if(gameStarted) return;
        shipIconsContainer.querySelectorAll(".ship-icon").forEach(i => i.classList.remove("selected"));
        icon.classList.add("selected");
        selectedSize = size;
      });
    }
  }

  function updateCounts(){
    for(let size in shipsConfig){
      size = +size;
      const countDiv = document.getElementById(`count-${size}`);
      if(!countDiv) continue;
      countDiv.innerHTML = "";
      const placedCount = placedShips.filter(s=>s.size === size).length;
      const remain = shipsConfig[size] - placedCount;
      for(let i=0; i<remain; i++){
        const block = document.createElement("div");
        block.classList.add("count-block");
        countDiv.appendChild(block);
      }
    }
  }

  function createBoard(board){
    board.innerHTML = "";
    for(let i=0; i<BOARD_SIZE*BOARD_SIZE; i++){
      const cell = document.createElement("div");
      cell.classList.add("cell");
      cell.dataset.index = i;
      board.appendChild(cell);
    }
  }
  createBoard(playerBoard);
  createBoard(enemyBoard);

  function isCellOccupied(idx, ships=placedShips){
    return ships.some(ship => ship.positions.includes(idx));
  }
  function hasNeighbouringShip(idx, ships=placedShips){
    const x = idx % BOARD_SIZE;
    const y = Math.floor(idx / BOARD_SIZE);
    for(let dy=-1; dy <=1; dy++){
      for(let dx=-1; dx <=1; dx++){
        if(dx === 0 && dy === 0) continue;
        const nx = x + dx;
        const ny = y + dy;
        if(nx>=0 && nx < BOARD_SIZE && ny >=0 && ny < BOARD_SIZE){
          if(isCellOccupied(ny*BOARD_SIZE + nx, ships)) return true;
        }
      }
    }
    return false;
  }
  function canPlaceShip(startIdx, size, orient, ships=placedShips){
    const x = startIdx % BOARD_SIZE;
    const y = Math.floor(startIdx / BOARD_SIZE);
    if(orient === "horizontal"){
      if(x + size > BOARD_SIZE) return false;
      for(let i=0; i<size; i++){
        if(isCellOccupied(y*BOARD_SIZE + x + i, ships) || hasNeighbouringShip(y*BOARD_SIZE + x + i, ships)) return false;
      }
    } else {
      if(y + size > BOARD_SIZE) return false;
      for(let i=0; i<size; i++){
        if(isCellOccupied((y+i)*BOARD_SIZE + x, ships) || hasNeighbouringShip((y+i)*BOARD_SIZE + x, ships)) return false;
      }
    }
    return true;
  }
  function drawShips(){
    playerBoard.querySelectorAll(".cell.ship").forEach(cell => {
      cell.classList.remove("ship");
      const btn = cell.querySelector(".remove-ship");
      if(btn) btn.remove();
    });
    placedShips.forEach((ship, index) => {
      ship.positions.forEach(pos => {
        const cell = playerBoard.querySelector(`.cell[data-index='${pos}']`);
        if(cell){
          cell.classList.add("ship");
          if(!gameStarted && !cell.querySelector(".remove-ship")){
            const btn = document.createElement("div");
            btn.classList.add("remove-ship");
            btn.textContent = "×";
            btn.title = "Видалити корабель";
            btn.style.position = "absolute";
            btn.style.top = "2px";
            btn.style.right = "2px";
            btn.style.width = "22px";
            btn.style.height = "22px";
            btn.style.fontSize = "18px";
            btn.style.background = "#f44";
            btn.style.color = "white";
            btn.style.borderRadius = "4px";
            btn.style.cursor = "pointer";
            btn.style.lineHeight = "22px";
            btn.style.textAlign = "center";
            btn.style.userSelect = "none";
            btn.style.zIndex = "10";
            btn.onclick = e => {
              e.stopPropagation();
              if(gameStarted) return;
              placedShips.splice(index, 1);
              drawShips();
              updateCounts();
              updateStartBtn();
            };
            cell.appendChild(btn);
          }
        }
      });
    });
  }
  function placeShip(startIdx, size, orient){
    if(gameStarted) return false;
    const placedCount = placedShips.filter(s=>s.size === size).length;
    if(placedCount >= shipsConfig[size]){
      alert(`Максимум ${shipsConfig[size]} кораблів розміром ${size}`);
      return false;
    }
    if(!canPlaceShip(startIdx, size, orient)) {
      alert("Корабель не поміщається або стикається з іншими");
      return false;
    }
    const x = startIdx % BOARD_SIZE;
    const y = Math.floor(startIdx / BOARD_SIZE);
    const positions = [];
    for(let i=0; i<size; i++){
      positions.push(orient==="horizontal" ? y*BOARD_SIZE + x + i : (y+i)*BOARD_SIZE + x);
    }
    placedShips.push({size, positions, hits: []});
    drawShips();
    updateCounts();
    updateStartBtn();
    return true;
  }
  function updateStartBtn(){
    for(let size in shipsConfig){
      size = +size;
      const placedCount = placedShips.filter(s=>s.size===size).length;
      if(placedCount < shipsConfig[size]){
        info.textContent = "Розставте всі кораблі";
        startGameBtn.disabled = true;
        return;
      }
    }
    info.textContent = "Усі кораблі розставлені!";
    startGameBtn.disabled = false;
  }

  function saveShipsToDB(){
    if(!roomId || !playerNumber) return;
    const shipsKey = playerNumber === 1 ? "player1Ships" : "player2Ships";
    const readyKey = playerNumber === 1 ? "ready1" : "ready2";
    const shipsData = placedShips.map(s => s.positions);
    return db.ref(roomId).update({
      [shipsKey]: shipsData,
      [readyKey]: true
    });
  }

  function listenRoom() {
    if(!roomId) return;
    db.ref(roomId).on('value', snapshot => {
      const data = snapshot.val();
      if(!data) return;

      if(data.ready1 && data.ready2 && !gameStarted) {
        gameStarted = true;
        currentPlayer = data.currentPlayer;

        const enemyData = playerNumber === 1 ? data.player2Ships : data.player1Ships;
        if(enemyData) enemyShips = enemyData.map(arr => ({positions: arr, size: arr.length, hits: []}));

        playerMoves = data.moves ? data.moves.filter(m => m.player === playerNumber) : [];
        enemyMoves = data.moves ? data.moves.filter(m => m.player !== playerNumber) : [];

        drawShips();
        drawEnemyBoard();

        updatePlayerBoard();
        updateEnemyBoard();

        playerBoard.querySelectorAll(".remove-ship").forEach(el => el.remove());

        info.textContent = currentPlayer === playerNumber ? "Ваш хід" : "Чекайте на хід супротивника";
        startGameBtn.disabled = true;
      }

      if(data.moves && data.moves.length > 0) {
        playerMoves = data.moves.filter(m => m.player === playerNumber);
        enemyMoves = data.moves.filter(m => m.player !== playerNumber);

        updatePlayerBoard();
        updateEnemyBoard();

        currentPlayer = data.currentPlayer;
        info.textContent = currentPlayer === playerNumber ? "Ваш хід" : "Чекайте на хід супротивника";

        checkGameOver();
      }
    });
  }

  // Потужна перевірка переможця
  function checkGameOver() {
    if(!placedShips.length || !enemyShips.length) return;
    const lost = placedShips.every(ship => ship.hits && ship.hits.length === ship.size);
    constLost = enemyShips.every(ship => ship.hits && ship.hits.length === ship.size);
    if(lost) {
      info.textContent = "Ви програли";
      gameStarted = false;
    } else if(enemyLost) {
      info.textContent = "Ви перемогли!";
      gameStarted = false;
    }
  }

  function updatePlayerBoard(){
    playerBoard.querySelectorAll('.cell').forEach(cell => {
      cell.classList.remove('hit', 'miss', 'sunk');
      const idx = +cell.dataset.index;

      let hit = false;
      let miss = false;
      if(enemyMoves) {
        const shot = enemyMoves.find(m => m.position === idx);
        if(shot){
          if(isCellOccupied(idx, placedShips)) {
            hit = true;
            const ship = placedShips.find(s => s.positions.includes(idx));
            if(ship) {
              if(!ship.hits) ship.hits = [];
              if(!ship.hits.includes(idx)) ship.hits.push(idx);
              if(ship.hits.length === ship.size) {
                ship.positions.forEach(p => {
                  const c = playerBoard.querySelector(`.cell[data-index='${p}']`);
                  if(c) c.classList.add('sunk');
                });
              }
            }
          } else miss = true;
        }
      }
      if(hit) cell.classList.add('hit');
      else if(miss) cell.classList.add('miss');
    });
  }

  function updateEnemyBoard(){
    enemyBoard.querySelectorAll('.cell').forEach(cell => {
      cell.classList.remove('hit', 'miss', 'sunk');
      const idx = +cell.dataset.index;

      let hit = false;
      let miss = false;
      if(playerMoves) {
        const shot = playerMoves.find(m => m.position === idx);
        if(shot){
          if(isCellOccupied(idx, enemyShips)) {
            hit = true;
            const ship = enemyShips.find(s => s.positions.includes(idx));
            if(ship) {
              if(!ship.hits) ship.hits = [];
              if(!ship.hits.includes(idx)) ship.hits.push(idx);
              if(ship.hits.length === ship.size) {
                ship.positions.forEach(p => {
                  const c = enemyBoard.querySelector(`.cell[data-index='${p}']`);
                  if(c) c.classList.add('sunk');
                });
              }
            }
          }
          else miss = true;
        }
      }
      if(hit) cell.classList.add('hit');
      else if(miss) cell.classList.add('miss');
    });
  }

  function drawEnemyBoard(){
    enemyBoard.querySelectorAll(".cell").forEach(c => {
      c.classList.remove("hit", "miss", "sunk");
      c.style.cursor = "pointer";
      c.style.boxShadow = "";
    });
  }

  async function makeMove(position){
    if(currentPlayer !== playerNumber) return false;
    try{
      const movesRef = db.ref(roomId + "/moves");
      const snapshot = await movesRef.once("value");
      let moves = snapshot.val() || [];
      moves.push({player: playerNumber, position});
      await db.ref(roomId).update({
        moves: moves,
        currentPlayer: playerNumber === 1 ? 2 : 1
      });
      return true;
    } catch(e){
      console.error(e);
      return false;
    }
  }

  playerBoard.addEventListener("click", e => {
    if(!e.target.classList.contains("cell")) return;
    placeShip(+e.target.dataset.index, selectedSize, orientation);
  });

  enemyBoard.addEventListener("click", async e => {
    if(!gameStarted) return;
    if(currentPlayer !== playerNumber){
      info.textContent = "Чекайте на хід супротивника";
      return;
    }
    if(!e.target.classList.contains("cell")) return;
    const idx = +e.target.dataset.index;
    if(e.target.classList.contains("hit") || e.target.classList.contains("miss")){
      info.textContent = "Ви вже стріляли сюди";
      return;
    }
    const res = await makeMove(idx);
    if(res) info.textContent = "Хід зроблено, чекайте суперника";
  });

  createRoomBtn.addEventListener("click", () => {
    roomId = generateRoomId();
    roomIdInput.value = roomId;
    playerNumber = 1;
    db.ref(roomId).set({
      player1Ships: null,
      player2Ships: null,
      moves: [],
      currentPlayer: 1,
      ready1: false,
      ready2: false
    }).then(() => {
      roomStatusBox.textContent = `Гру створено - Онлайн ${playerNumber}`;
      info.textContent = "Розставте кораблі та очікуйте супротивника";
      listenRoom();
    });
  });

  joinRoomBtn.addEventListener("click", () => {
    const id = roomIdInput.value.trim();
    if(!/^\d{4}$/.test(id)) {
      alert("Введіть коректний ID кімнати із 4 цифр");
      return;
    }
    db.ref(id).once("value").then(snapshot => {
      if(!snapshot.exists()){
        alert("Кімната не знайдена");
        return;
      }
      roomId = id;
      playerNumber = 2;
      roomStatusBox.textContent = `Гру створено - Онлайн ${playerNumber}`;
      info.textContent = "Розставте кораблі та очікуйте початку гри";
      listenRoom();
    });
  });

  startGameBtn.addEventListener("click", () => {
    if(!roomId || !playerNumber){
      alert("Створіть або приєднайтеся до кімнати");
      return;
    }
    if(placedShips.length === 0){
      alert("Розставте кораблі");
      return;
    }
    saveShipsToDB();
    info.textContent = "Очікуємо супротивника...";
  });

  document.querySelectorAll("#orientationIcons .orient-icon").forEach(icon => {
    icon.addEventListener("click", () => {
      if(gameStarted) return;
      document.querySelectorAll("#orientationIcons .orient-icon").forEach(i => i.classList.remove("selected"));
      icon.classList.add("selected");
      orientation = icon.dataset.orient;
    });
  });

  createShipIcons();
  updateCounts();
  updateStartBtn();
</script>

</body>
</html>

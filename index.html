<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Морський бій з Firebase</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 10px;
  }
  #topControls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    font-weight: bold;
    font-size: 14px;
  }
  #topControls input {
    width: 100px;
    padding: 6px;
    font-size: 14px;
  }
  #topControls button {
    padding: 6px 12px;
    font-size: 14px;
    cursor: pointer;
  }
  #roomStatusBox {
    min-width: 140px;
    font-weight: bold;
    color: #155;
    text-align: center;
    border: 1px solid #33a;
    padding: 3px 8px;
    border-radius: 6px;
  }
  #gameArea {
    display: flex;
    gap: 40px;
    align-items: flex-start;
  }
  #sidebar {
    width: 55px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  #shipIconsContainer {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ship-icon {
    width: 14px; /* половина предыдущего 28px */
    height: 50px; /* половина предыдущего 100px */
    background: #3c6db5;
    border-radius: 5px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .ship-icon.selected {
    border: 2px solid #3377cc;
    box-shadow: 0 0 6px #3377cc;
  }
  .ship-segment {
    flex: 1;
    border-bottom: 1px solid rgba(255,255,255,0.7);
  }
  .ship-segment:last-child {
    border-bottom: none;
  }
  #orientationIcons {
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .orient-icon {
    width: 18px;
    height: 18px;
    background: #b7cdf5;
    border-radius: 5px;
    color: #224977;
    font-weight: bold;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    line-height: 18px;
  }
  .orient-icon.selected {
    box-shadow: 0 0 8px #224977;
    border: 2px solid #224977;
  }
  .orient-icon.orient-horizontal::after {
    content: "⇆";
  }
  .orient-icon.orient-vertical::after {
    content: "⇅";
  }
  #boardsAndStatus {
    display: flex;
    align-items: center;
    gap: 35px; /* больше расстояние между досками */
    flex-grow: 1;
  }
  #playerBoardContainer, #enemyBoardContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  #playerBoardContainer strong, #enemyBoardContainer strong {
    margin-bottom: 8px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(10, 26px); /* чуть больше клетка */
    grid-gap: 2px;
    border-radius: 10px;
    user-select: none;
  }
  #playerBoard { background: #bdcee9; } /* более светлый синий */
  #enemyBoard { background: #d1e7d0; } /* светло-зеленый */
  .cell {
    width: 26px;
    height: 26px;
    background: #e5edfb; /* более светлый фон */
    border: 1px solid #335a8a; /* чуть темнее границы */
    cursor: pointer;
    position: relative;
  }
  #enemyBoard .cell {
    background: #e6efde; /* светло-зеленый фон */
  }
  .cell.ship {
    background: #2b548a; /* темный синий */
  }
  .cell.hit {
    background: #cc4a46; /* более насыщенный красный */
  }
  .cell.miss {
    background: #5a8a47; /* насыщенный зеленый */
  }
  .cell.sunk {
    box-shadow: inset 0 0 10px 3px #54160d; /* темнее красный */
  }
  .remove-ship {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 16px;
    height: 16px;
    font-size: 14px;
    background: #b93333;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    line-height: 16px;
    text-align: center;
    user-select: none;
    z-index: 20;
  }
  #startGameBtn {
    margin-top: 20px;
    font-size: 16px;
    padding: 10px 0;
    width: 100%;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background-color: #365fcb;
    color: white;
  }
  #startGameBtn:disabled {
    background: #9da6b7;
    cursor: not-allowed;
  }
  #statusBox {
    width: 65px;
    font-weight: bold;
    font-size: 18px;
    text-align: center;
    color: #222;
    user-select: none;
    border: 2px solid #666;
    border-radius: 8px;
    padding: 6px 0;
  }
</style>
</head>
<body>

<div id="topControls">
  <input id="roomIdInput" maxlength="4" type="text" placeholder="ID кімнати" />
  <button id="createRoomBtn">Створити кімнату</button>
  <button id="joinRoomBtn">Приєднатись</button>
  <div id="roomStatusBox">Очікування</div>
</div>

<div id="gameArea">
  <div id="sidebar">
    <div id="shipIconsContainer"></div>
    <div id="orientationIcons">
      <div class="orient-icon orient-horizontal selected" data-orient="horizontal"></div>
      <div class="orient-icon orient-vertical" data-orient="vertical"></div>
    </div>
    <button id="startGameBtn" disabled>Почати гру</button>
  </div>
  
  <div id="statusBox">Очікуйте</div>

  <div id="boardsAndStatus">
    <div id="playerBoardContainer">
      <strong>Ваша дошка</strong>
      <div id="playerBoard" class="board"></div>
    </div>
    <div id="enemyBoardContainer">
      <strong>Дошка супротивника</strong>
      <div id="enemyBoard" class="board"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyATPvyALFcJHnPeiIAt6sDyeFi4nwmnNOU",
    authDomain: "bsrs-1.firebaseapp.com",
    databaseURL: "https://bsrs-1-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "bsrs-1",
    storageBucket: "bsrs-1.appspot.com",
    messagingSenderId: "56393365787",
    appId: "1:56393365787:web:9514aae491938b569ebbbe"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const BOARD_SIZE=10;
  const shipsConfig = {4:1,3:2,2:3,1:4};

  let roomId=null;
  let playerNumber=null;
  let currentPlayer=null;
  let gameStarted=false;
  let placedShips=[];
  let enemyShips=[];
  let orientation="horizontal";
  let selectedSize=4;
  let playerMoves=[];
  let enemyMoves=[];

  const playerBoard=document.getElementById("playerBoard");
  const enemyBoard=document.getElementById("enemyBoard");
  const roomStatusBox=document.getElementById("roomStatusBox");
  const roomIdInput=document.getElementById("roomIdInput");
  const createRoomBtn=document.getElementById("createRoomBtn");
  const joinRoomBtn=document.getElementById("joinRoomBtn");
  const startGameBtn=document.getElementById("startGameBtn");
  const shipIconsContainer=document.getElementById("shipIconsContainer");
  const statusBox=document.getElementById("statusBox");

  function generateRoomId() {
    return Math.floor(1000 + Math.random()*9000).toString();
  }

  // Создание иконок кораблей вертикально, уменьшены
  function createShipIcons() {
    shipIconsContainer.innerHTML = "";
    for (let size in shipsConfig) {
      size = +size;
      const wrapper = document.createElement("div");
      wrapper.className = "ship-icon";
      if (size === selectedSize) wrapper.classList.add("selected");
      wrapper.dataset.size = size;
      for (let i = 0; i < size; i++) {
        const seg = document.createElement("div");
        seg.className = "ship-segment";
        wrapper.appendChild(seg);
      }
      shipIconsContainer.appendChild(wrapper);

      wrapper.onclick = () => {
        if(gameStarted) return;
        shipIconsContainer.querySelectorAll(".ship-icon").forEach(i => i.classList.remove("selected"));
        wrapper.classList.add("selected");
        selectedSize = size;
      };
    }
  }

  function createBoard(board) {
    board.innerHTML = "";
    for (let i = 0; i < BOARD_SIZE * BOARD_SIZE; i++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      cell.dataset.index = i;
      board.appendChild(cell);
    }
  }

  createBoard(playerBoard);
  createBoard(enemyBoard);

  function isCellOccupied(idx, ships=placedShips) {
    return ships.some(ship => ship.positions.includes(idx));
  }

  function hasNeighbouringShip(idx, ships=placedShips) {
    const x = idx % BOARD_SIZE;
    const y = Math.floor(idx / BOARD_SIZE);
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;
        const nx = x + dx;
        const ny = y + dy;
        if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
          if (isCellOccupied(ny * BOARD_SIZE + nx, ships)) return true;
        }
      }
    }
    return false;
  }

  function canPlaceShip(startIdx, size, orient, ships=placedShips) {
    const x = startIdx % BOARD_SIZE;
    const y = Math.floor(startIdx / BOARD_SIZE);
    if (orient === "horizontal") {
      if (x + size > BOARD_SIZE) return false;
      for (let i = 0; i < size; i++) {
        if (isCellOccupied(y * BOARD_SIZE + x + i, ships) || hasNeighbouringShip(y * BOARD_SIZE + x + i, ships))
          return false;
      }
    } else {
      if (y + size > BOARD_SIZE) return false;
      for (let i = 0; i < size; i++) {
        if (isCellOccupied((y + i) * BOARD_SIZE + x, ships) || hasNeighbouringShip((y + i) * BOARD_SIZE + x, ships))
          return false;
      }
    }
    return true;
  }

  function drawShips() {
    playerBoard.querySelectorAll(".cell.ship").forEach(cell => {
      cell.classList.remove("ship");
      const btn = cell.querySelector(".remove-ship");
      if (btn) btn.remove();
    });
    placedShips.forEach((ship, index) => {
      ship.positions.forEach(pos => {
        const cell = playerBoard.querySelector(`.cell[data-index='${pos}']`);
        if (cell) {
          cell.classList.add("ship");
          if (!gameStarted && !cell.querySelector(".remove-ship")) {
            const btn = document.createElement("div");
            btn.classList.add("remove-ship");
            btn.textContent = "×";
            btn.title = "Видалити корабель";
            btn.style.position = "absolute";
            btn.style.top = "2px";
            btn.style.right = "2px";
            btn.style.width = "22px";
            btn.style.height = "22px";
            btn.style.fontSize = "18px";
            btn.style.background = "#f44";
            btn.style.color = "white";
            btn.style.borderRadius = "4px";
            btn.style.cursor = "pointer";
            btn.style.lineHeight = "22px";
            btn.style.textAlign = "center";
            btn.style.userSelect = "none";
            btn.style.zIndex = "10";
            btn.onclick = e => {
              e.stopPropagation();
              if (gameStarted) return;
              placedShips.splice(index, 1);
              drawShips();
              updateStartBtn();
            };
            cell.appendChild(btn);
          }
        }
      });
    });
  }

  function placeShip(startIdx, size, orient) {
    if (gameStarted) return false;
    const placedCount = placedShips.filter(s => s.size === size).length;
    if (placedCount >= shipsConfig[size]) {
      alert(`Максимум ${shipsConfig[size]} кораблів розміром ${size}`);
      return false;
    }
    if (!canPlaceShip(startIdx, size, orient)) {
      alert("Корабель не поміщається або стикається з іншими");
      return false;
    }
    const x = startIdx % BOARD_SIZE;
    const y = Math.floor(startIdx / BOARD_SIZE);
    const positions = [];
    for (let i = 0; i < size; i++) {
      positions.push(orient === "horizontal" ? y * BOARD_SIZE + x + i : (y + i) * BOARD_SIZE + x);
    }
    placedShips.push({ size, positions, hits: [] });
    drawShips();
    updateStartBtn();
    return true;
  }

  function updateStartBtn() {
    for (let size in shipsConfig) {
      size = +size;
      const placedCount = placedShips.filter(s => s.size === size).length;
      if (placedCount < shipsConfig[size]) {
        setStatus("Розставте всі кораблі");
        startGameBtn.disabled = true;
        return;
      }
    }
    setStatus("Усі кораблі розставлені");
    startGameBtn.disabled = false;
  }

  function setStatus(msg) {
    statusBox.textContent = msg;
  }

  function saveShipsToDB() {
    if (!roomId || !playerNumber) return;
    const shipsKey = playerNumber === 1 ? "player1Ships" : "player2Ships";
    const readyKey = playerNumber === 1 ? "ready1" : "ready2";
    const shipsData = placedShips.map(s => s.positions);
    return db.ref(roomId).update({ [shipsKey]: shipsData, [readyKey]: true });
  }

  function listenRoom() {
    if (!roomId) return;
    db.ref(roomId).on("value", snapshot => {
      const data = snapshot.val();
      if (!data) return;

      if (data.ready1 && data.ready2 && !gameStarted) {
        gameStarted = true;
        currentPlayer = data.currentPlayer;

        const enemyData = playerNumber === 1 ? data.player2Ships : data.player1Ships;
        if (enemyData) enemyShips = enemyData.map(arr => ({ positions: arr, size: arr.length, hits: [] }));

        playerMoves = data.moves ? data.moves.filter(m => m.player === playerNumber) : [];
        enemyMoves = data.moves ? data.moves.filter(m => m.player !== playerNumber) : [];

        drawShips();
        drawEnemyBoard();

        updatePlayerBoard();
        updateEnemyBoard();

        playerBoard.querySelectorAll(".remove-ship").forEach(el => el.remove());

        setStatus(currentPlayer === playerNumber ? "Ваш хід" : "Хід супротивника");
        startGameBtn.disabled = true;
      }

      if (data.moves && data.moves.length > 0) {
        playerMoves = data.moves.filter(m => m.player === playerNumber);
        enemyMoves = data.moves.filter(m => m.player !== playerNumber);

        updatePlayerBoard();
        updateEnemyBoard();

        currentPlayer = data.currentPlayer;
        setStatus(currentPlayer === playerNumber ? "Ваш хід" : "Хід супротивника");

        checkGameOver();
      }
    });
  }

  function updatePlayerBoard() {
    playerBoard.querySelectorAll(".cell").forEach(cell => {
      cell.classList.remove("hit", "miss", "sunk");
      const idx = +cell.dataset.index;
      let hit = false, miss = false;
      if (enemyMoves) {
        const shot = enemyMoves.find(m => m.position === idx);
        if (shot) {
          if (isCellOccupied(idx, placedShips)) {
            hit = true;
            markShipHit(placedShips, idx, playerBoard);
          } else miss = true;
        }
      }
      if (hit) cell.classList.add("hit");
      else if (miss) cell.classList.add("miss");
    });
  }

  function updateEnemyBoard() {
    enemyBoard.querySelectorAll(".cell").forEach(cell => {
      cell.classList.remove("hit", "miss", "sunk");
      const idx = +cell.dataset.index;
      let hit = false, miss = false;
      if (playerMoves) {
        const shot = playerMoves.find(m => m.position === idx);
        if (shot) {
          if (isCellOccupied(idx, enemyShips)) {
            hit = true;
            markShipHit(enemyShips, idx, enemyBoard);
          } else miss = true;
        }
      }
      if (hit) cell.classList.add("hit");
      else if (miss) cell.classList.add("miss");
    });
  }

  function markShipHit(ships, idx, board) {
    const ship = ships.find(s => s.positions.includes(idx));
    if (!ship) return;
    if (!ship.hits) ship.hits = [];
    if (!ship.hits.includes(idx)) ship.hits.push(idx);
    if (ship.hits.length === ship.size) {
      ship.positions.forEach(pos => {
        const c = board.querySelector(`.cell[data-index='${pos}']`);
        if (c) c.classList.add("sunk");
      });
    }
  }

  function drawEnemyBoard() {
    enemyBoard.querySelectorAll(".cell").forEach(c => {
      c.classList.remove("hit", "miss", "sunk");
      c.style.cursor = "pointer";
      c.style.boxShadow = "";
    });
  }

  async function makeMove(position) {
    if (currentPlayer !== playerNumber) return false;
    try {
      const movesRef = db.ref(roomId + "/moves");
      const snapshot = await movesRef.once("value");
      let moves = snapshot.val() || [];
      if (moves.find(m => m.position === position)) return false;
      moves.push({ player: playerNumber, position });
      await db.ref(roomId).update({
        moves: moves,
        currentPlayer: playerNumber === 1 ? 2 : 1
      });
      return true;
    } catch (e) {
      console.error(e);
      return false;
    }
  }

  function checkGameOver() {
    if (!placedShips.length || !enemyShips.length) return;
    const lost = placedShips.every(ship => ship.hits && ship.hits.length === ship.size);
    const enemyLost = enemyShips.every(ship => ship.hits && ship.hits.length === ship.size);
    if (lost) {
      setStatus("Ви програли!");
      gameStarted = false;
    } else if (enemyLost) {
      setStatus("Ви перемогли!");
      gameStarted = false;
    }
  }

  // Слушатели событий
  playerBoard.addEventListener("click", e => {
    if (!e.target.classList.contains("cell")) return;
    placeShip(+e.target.dataset.index, selectedSize, orientation);
  });

  enemyBoard.addEventListener("click", async e => {
    if (!gameStarted) return;
    if (currentPlayer !== playerNumber) {
      setStatus("Чекайте хід супротивника");
      return;
    }
    if (!e.target.classList.contains("cell")) return;
    const idx = +e.target.dataset.index;
    if (e.target.classList.contains("hit") || e.target.classList.contains("miss")) {
      setStatus("Ви вже стріляли сюди");
      return;
    }
    const res = await makeMove(idx);
    if (res) setStatus("Хід зроблено, чекайте супротивника");
  });

  createRoomBtn.addEventListener("click", () => {
    roomId = generateRoomId();
    roomIdInput.value = roomId;
    playerNumber = 1;
    db.ref(roomId).set({
      player1Ships: null,
      player2Ships: null,
      moves: [],
      currentPlayer: 1,
      ready1: false,
      ready2: false
    }).then(() => {
      roomStatusBox.textContent = `Гру створено - Онлайн ${playerNumber}`;
      setStatus("Розставте кораблі та очікуйте супротивника");
      listenRoom();
    });
  });

  joinRoomBtn.addEventListener("click", () => {
    const id = roomIdInput.value.trim();
    if (!/^\d{4}$/.test(id)) {
      alert("Введіть коректний ID кімнати із 4 цифр");
      return;
    }
    db.ref(id).once("value").then(snapshot => {
      if (!snapshot.exists()) {
        alert("Кімната не знайдена");
        return;
      }
      roomId = id;
      playerNumber = 2;
      roomStatusBox.textContent = `Гру створено - Онлайн ${playerNumber}`;
      setStatus("Розставте кораблі та очікуйте початку гри");
      listenRoom();
    });
  });

  startGameBtn.addEventListener("click", () => {
    if (!roomId || !playerNumber) {
      alert("Створіть або приєднайтеся до кімнати");
      return;
    }
    if (placedShips.length === 0) {
      alert("Розставте кораблі");
      return;
    }
    saveShipsToDB();
    setStatus("Очікуємо супротивника...");
  });

  document.querySelectorAll("#orientationIcons .orient-icon").forEach(icon => {
    icon.addEventListener("click", () => {
      if (gameStarted) return;
      document.querySelectorAll("#orientationIcons .orient-icon").forEach(i => i.classList.remove("selected"));
      icon.classList.add("selected");
      orientation = icon.dataset.orient;
    });
  });

  // Инициализация UI
  createShipIcons();
  updateStartBtn();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Морской бой онлайн упрощённый</title>
<style>
  body {
    font-family: Arial, sans-serif; max-width: 700px; margin: auto; padding: 10px;
  }
  #playerBoard, #enemyBoard {
    display: grid; grid-template-columns: repeat(10, 30px); grid-gap: 2px; margin: 10px auto; width: 308px;
  }
  .cell {
    width: 30px; height: 30px; background: #cce; border: 1px solid #339; cursor: pointer; user-select: none;
  }
  .cell.ship {
    background: #559;
  }
  .cell.hit {
    background: red;
  }
  .cell.miss {
    background: #eef;
  }
</style>
</head>
<body>

<h2>Морской бой онлайн (упрощённый)</h2>
<div id="info">Загрузка комнаты...</div>

<div>
  <strong>Ваша доска</strong>
  <div id="playerBoard"></div>
</div>

<div>
  <strong>Доска соперника</strong>
  <div id="enemyBoard"></div>
</div>

<button id="startBtn" disabled>Начать игру</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

  // Вставь сюда настройки из Firebase
  const firebaseConfig = {
    apiKey: "ВАШ_API_KEY",
    authDomain: "ВАШ_ДОМЕН.firebaseapp.com",
    databaseURL: "ВАШ_URL_DATABSE",
    projectId: "ВАШ_PROJECT_ID",
    storageBucket: "ВАШ_STORAGE_BUCKET",
    messagingSenderId: "ВАШ_SENDER_ID",
    appId: "ВАШ_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  const playerBoard = document.getElementById('playerBoard');
  const enemyBoard = document.getElementById('enemyBoard');
  const info = document.getElementById('info');
  const startBtn = document.getElementById('startBtn');

  const BOARD_SIZE = 10;
  let placedShips = [];
  let playerShots = new Set();
  let enemyShots = new Set();

  // Создаем доски
  function createBoard(board, clickable = false) {
    board.innerHTML = '';
    for(let i=0; i<BOARD_SIZE*BOARD_SIZE; i++){
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.dataset.index = i;
      if(clickable) cell.style.cursor = 'pointer';
      board.appendChild(cell);
    }
  }

  createBoard(playerBoard, true);
  createBoard(enemyBoard, true);

  // Простая расстановка 5 однопалубных кораблей для примера
  function placeDefaultShips() {
    placedShips = [];
    let count = 0;
    while(count < 5) {
      let pos = Math.floor(Math.random()*100);
      if(!placedShips.includes(pos)) {
        placedShips.push(pos);
        count++;
      }
    }
    placedShips.forEach(pos => {
      const cell = playerBoard.querySelector(`.cell[data-index='${pos}']`);
      if(cell) cell.classList.add('ship');
    });
  }

  placeDefaultShips();

  // Пример события клика по доске соперника для выстрела
  enemyBoard.addEventListener('click', e => {
    if(!e.target.classList.contains('cell')) return;
    const pos = +e.target.dataset.index;
    if(playerShots.has(pos)) {
      alert('Уже стреляли сюда');
      return;
    }
    playerShots.add(pos);
    if(Math.random()<0.3) { // Случайный пример попадания
      e.target.classList.add('hit');
    } else {
      e.target.classList.add('miss');
    }
  });

  info.textContent = 'Это упрощённый пример. Дальше будет полноценный мультиплеер.';

  startBtn.disabled = true;

</script>

</body>
</html>

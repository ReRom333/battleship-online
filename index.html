<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Морський бій з Firebase</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 10px;
  }
  #topControls {
    display: flex;
    justify-content: center; /* Центрируем */
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    font-weight: bold;
    font-size: 14px;
  }
  #topControls input {
    width: 110px;
    padding: 6px;
    font-size: 14px;
  }
  #topControls button {
    padding: 6px 12px;
    font-size: 14px;
    cursor: pointer;
  }
  #roomStatusBox {
    min-width: 160px;
    font-weight: bold;
    color: #155;
    text-align: center;
  }
  #gameArea {
    display: flex;
    gap: 40px; /* Расширенное расстояние между полями */
    align-items: flex-start;
  }
  #sidebar {
    width: 44px; /* Уменьшено для 60% */
    display: flex;
    flex-direction: column;
    gap: 9px;
    align-items: center;
  }
  #shipIconsContainer {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ship-icon {
    width: 16px;
    height: 60px;
    background: #559;
    border-radius: 5px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .ship-icon.selected {
    border: 2px solid #339;
    box-shadow: 0 0 8px #339;
  }
  .ship-segment {
    flex: 1;
    border-bottom: 1px solid rgba(255,255,255,0.7);
  }
  .ship-segment:last-child {
    border-bottom: none;
  }
  #orientationIcons {
    display: flex;
    gap: 8px;
  }
  .orient-icon {
    width: 20px;
    height: 20px;
    background: #cce;
    border-radius: 5px;
    color: #339;
    font-weight: bold;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    line-height: 20px;
  }
  .orient-icon.selected {
    box-shadow: 0 0 8px #339;
    border: 2px solid #339;
  }
  .orient-icon.orient-horizontal::after {
    content: "⇆";
  }
  .orient-icon.orient-vertical::after {
    content: "⇅";
  }
  #boardsAndStatus {
    display: flex;
    align-items: center;
    gap: 30px;
    flex-grow: 1;
  }
  #playerBoardContainer, #enemyBoardContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  #playerBoardContainer strong, #enemyBoardContainer strong {
    margin-bottom: 8px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(10, 24px);
    grid-gap: 2px;
    border-radius: 8px;
    user-select: none;
  }
  #playerBoard { background: #c4d9f7; }
  #enemyBoard { background: #dbeade; }
  .cell {
    width: 24px;
    height: 24px;
    background: #e1eaff;
    border: 1px solid #339;
    cursor: pointer;
    position: relative;
  }
  #enemyBoard .cell {
    background: #e9f3e9;
  }
  .cell.ship {
    background: #375aab;
  }
  .cell.hit {
    background: #f04e4c;
  }
  .cell.miss {
    background: #60945f;
  }
  .cell.sunk {
    box-shadow: inset 0 0 8px 2px #7a110b;
  }
  .remove-ship {
    position: absolute;
    top: 1px;
    right: 1px;
    width: 16px;
    height: 16px;
    font-size: 14px;
    background: #f33;
    color: white;
    border-radius: 3px;
    cursor: pointer;
    line-height: 16px;
    text-align: center;
    user-select: none;
    z-index: 10;
  }
  #startGameBtn {
    margin-top: 14px;
    font-size: 16px;
    padding: 10px 0;
    width: 100%;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    background-color: #4477ff;
    color: white;
  }
  #startGameBtn:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  #statusBox {
    width: 100px;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-weight: bold;
    font-size: 18px;
    text-align: center;
    color: #333;
    user-select: none;
    flex-shrink: 0;
  }
</style>
</head>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Морской бой с Firebase сетью</title>
<style>
  /* Стили аналогичны твоим предыдущим */
  body { font-family: Arial, sans-serif; max-width:700px; margin:auto; padding:10px;}
  h2 { text-align:center; }
  #boards { display:flex; justify-content:space-between; gap:10px; margin-bottom:15px; }
  #playerBoardContainer, #enemyBoardContainer { width:48%; text-align:center;}
  .board { display:grid; grid-template-columns:repeat(10,30px); grid-gap:2px; margin-top:5px; position:relative;}
  .cell { width:30px; height:30px; background:#cce; border:1px solid #339; cursor:pointer; user-select:none; position:relative;}
  .cell.ship { background:#559; }
  .cell.hit { background:#f55; }
  .cell.miss { background:#88a; }
  #info { text-align:center; margin-bottom:15px; min-height:24px; font-weight:bold; font-size:18px;}
  #shipIconsContainer { display:flex; justify-content:center; gap:20px; margin-bottom:15px;}
  .ship-icon { cursor:pointer; border: 2px solid transparent; user-select:none; display:flex; justify-content:center; align-items:center; background:#559; color:white; font-weight:bold; border-radius:6px; position:relative; height:30px;}
  .ship-icon.selected { border-color:#33a; box-shadow:0 0 8px #33a;}
  .ship-segment { height:30px; border-right:1px solid rgba(255,255,255,0.7); flex:1;}
  .ship-segment:last-child { border-right:none; }
  .count-icons { display:flex; justify-content:center; gap:4px; margin-top:5px;}
  .count-block { width:13px; height:13px; background:#aad; border:1px solid #44a; border-radius:3px;}
  #orientationIcons { display:flex; justify-content:center; gap:15px; margin-bottom:15px;}
  .orient-icon { cursor:pointer; width:40px; height:40px; background:#cce; color:#339; font-weight:bold; font-size:28px; display:flex; align-items:center; justify-content:center; border-radius:6px; user-select:none;}
  .orient-icon.selected { border-color:#33a; box-shadow:0 0 8px #33a;}
  .orient-icon.orient-horizontal::after { content:"⇆"; }
  .orient-icon.orient-vertical::after { content:"⇅"; }
  .cell.ship .remove-ship { position:absolute; top:2px; right:2px; width:22px; height:22px; font-size:18px; background:#f44; color:white; border-radius:4px; cursor:pointer; line-height:22px; text-align:center; user-select:none; z-index:10;}
  #roomControls {text-align:center; margin-bottom:10px;}
  #roomControls input {width: 200px;}
</style>
</head>
<body>

<h2>Морской бой с Firebase сетью</h2>

<div id="roomControls">
  <input type="text" id="roomIdInput" placeholder="ID комнаты"/>
  <button id="createRoomBtn">Создать комнату</button>
  <button id="joinRoomBtn">Присоединиться</button>
  <div id="roomStatus"></div>
</div>

<div id="info">Выберите корабль, ориентацию и расставьте корабли</div>

<div id="shipIconsContainer"></div>

<div id="orientationIcons">
  <div class="orient-icon orient-horizontal selected" data-orient="horizontal"></div>
  <div class="orient-icon orient-vertical" data-orient="vertical"></div>
</div>

<div id="boards">
  <div id="playerBoardContainer">
    <strong>Своя доска</strong>
    <div id="playerBoard" class="board"></div>
  </div>
  <div id="enemyBoardContainer">
    <strong>Доска соперника</strong>
    <div id="enemyBoard" class="board"></div>
  </div>
</div>

<div style="text-align:center; margin-top:15px;">
  <button id="startGameBtn" disabled>Начать игру</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyATPvyALFcJHnPeiIAt6sDyeFi4nwmnNOU",
  authDomain: "bsrs-1.firebaseapp.com",
  databaseURL: "https://bsrs-1-default-rtdb.firebaseio.com",
  projectId: "bsrs-1",
  storageBucket: "bsrs-1.appspot.com",
  messagingSenderId: "56393365787",
  appId: "1:56393365787:web:9514aae491938b569ebbbe"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Game logic vars
const BOARD_SIZE = 10;
const shipsConfig = {4:1,3:2,2:3,1:4};
let placedShips = [];
let selectedSize = 4;
let orientation = "horizontal";
let gameStarted = false;
let currentPlayer = null; // 1 или 2
let playerNumber = null; // 1 или 2
let roomId = null;
let enemyShips = [];

const playerBoard = document.getElementById("playerBoard");
const enemyBoard = document.getElementById("enemyBoard");
const info = document.getElementById("info");
const startGameBtn = document.getElementById("startGameBtn");
const shipIconsContainer = document.getElementById("shipIconsContainer");

const roomIdInput = document.getElementById("roomIdInput");
const createRoomBtn = document.getElementById("createRoomBtn");
const joinRoomBtn = document.getElementById("joinRoomBtn");
const roomStatus = document.getElementById("roomStatus");

// UI setup
function createShipIcons(){
  shipIconsContainer.innerHTML = "";
  for (let size in shipsConfig){
    size = +size;
    const wrapper = document.createElement("div");
    wrapper.style = "display:flex; flex-direction:column; align-items:center; cursor:pointer";
    const icon = document.createElement("div");
    icon.classList.add("ship-icon");
    if(size === selectedSize) icon.classList.add("selected");
    icon.style.width = 30*size + "px";
    icon.style.height = "30px";
    icon.dataset.size = size;
    icon.style.display = "flex";
    for(let i=0; i<size; i++){
      const seg = document.createElement("div");
      seg.classList.add("ship-segment");
      icon.appendChild(seg);
    }
    const countDiv = document.createElement("div");
    countDiv.classList.add("count-icons");
    countDiv.id = `count-${size}`;
    countDiv.style.marginTop = "5px";
    wrapper.appendChild(icon);
    wrapper.appendChild(countDiv);
    shipIconsContainer.appendChild(wrapper);

    icon.onclick = () => {
      if(gameStarted) return;
      shipIconsContainer.querySelectorAll(".ship-icon").forEach(i=>i.classList.remove("selected"));
      icon.classList.add("selected");
      selectedSize = size;
    }
  }
}
function updateCounts(){
  for(let size in shipsConfig){
    size = +size;
    const countDiv = document.getElementById(`count-${size}`);
    if(!countDiv) continue;
    countDiv.innerHTML = "";
    const placedCount = placedShips.filter(s => s.size === size).length;
    const remain = shipsConfig[size] - placedCount;
    for(let i=0; i< remain; i++){
      const block = document.createElement("div");
      block.classList.add("count-block");
      countDiv.appendChild(block);
    }
  }
}
function createBoard(board){
  board.innerHTML = "";
  for(let i=0; i<BOARD_SIZE*BOARD_SIZE; i++){
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.index = i;
    board.appendChild(cell);
  }
}
createBoard(playerBoard);
createBoard(enemyBoard);

function isCellOccupied(idx, ships = placedShips){
  return ships.some(ship => ship.positions.includes(idx));
}
function hasNeighbouringShip(idx, ships = placedShips){
  const x = idx % BOARD_SIZE;
  const y = Math.floor(idx / BOARD_SIZE);
  for(let dy = -1; dy<=1; dy++){
    for(let dx = -1; dx<=1; dx++){
      if(dx === 0 && dy === 0) continue;
      const nx = x+dx;
      const ny = y+dy;
      if(nx>=0 && nx < BOARD_SIZE && ny >=0 && ny < BOARD_SIZE){
        if(isCellOccupied(ny*BOARD_SIZE + nx, ships)) return true;
      }
    }
  }
  return false;
}
function canPlaceShip(startIdx, size, orient, ships = placedShips){
  const x = startIdx % BOARD_SIZE;
  const y = Math.floor(startIdx / BOARD_SIZE);
  if(orient === "horizontal"){
    if(x + size > BOARD_SIZE) return false;
    for(let i=0; i<size; i++){
      if(isCellOccupied(y*BOARD_SIZE + x + i, ships) || hasNeighbouringShip(y*BOARD_SIZE + x + i, ships)) return false;
    }
  } else {
    if(y + size > BOARD_SIZE) return false;
    for(let i=0; i<size; i++){
      if(isCellOccupied((y+i)*BOARD_SIZE + x, ships) || hasNeighbouringShip((y+i)*BOARD_SIZE + x, ships)) return false;
    }
  }
  return true;
}
function drawShips(){
  playerBoard.querySelectorAll(".cell.ship").forEach(cell => {
    cell.classList.remove("ship");
    const btn = cell.querySelector(".remove-ship");
    if(btn) btn.remove();
  });
  placedShips.forEach((ship,index) => {
    ship.positions.forEach(pos => {
      const cell = playerBoard.querySelector(`.cell[data-index='${pos}']`);
      if(cell){
        cell.classList.add("ship");
        if(!gameStarted && !cell.querySelector(".remove-ship")){
          const btn = document.createElement("div");
          btn.classList.add("remove-ship");
          btn.textContent = "×";
          btn.title = "Удалить корабль";
          btn.style.position = "absolute";
          btn.style.top = "2px";
          btn.style.right = "2px";
          btn.style.width = "22px";
          btn.style.height = "22px";
          btn.style.fontSize = "18px";
          btn.style.background = "#f44";
          btn.style.color = "white";
          btn.style.borderRadius = "4px";
          btn.style.cursor = "pointer";
          btn.style.lineHeight = "22px";
          btn.style.textAlign = "center";
          btn.style.userSelect = "none";
          btn.style.zIndex = "10";
          btn.onclick = e => {
            e.stopPropagation();
            if(gameStarted) return;
            placedShips.splice(index,1);
            drawShips();
            updateCounts();
            updateStartBtn();
          }
          cell.appendChild(btn);
        }
      }
    });
  });
}
function placeShip(startIdx, size, orient){
  if(gameStarted) return false;
  const placedCount = placedShips.filter(s => s.size === size).length;
  if(placedCount >= shipsConfig[size]){
    alert(`Можно поставить максимум ${shipsConfig[size]} корабль(ей) размера ${size}`);
    return false;
  }
  if(!canPlaceShip(startIdx, size, orient)) {
    alert("Корабль не помещается или соприкасается с другими");
    return false;
  }
  const x = startIdx % BOARD_SIZE;
  const y = Math.floor(startIdx / BOARD_SIZE);
  const positions = [];
  for(let i=0; i<size; i++){
    positions.push(orient === "horizontal" ? y*BOARD_SIZE + x + i : (y+i)*BOARD_SIZE + x);
  }
  placedShips.push({size, positions, hits: []});
  drawShips();
  updateCounts();
  updateStartBtn();
  return true;
}
function updateStartBtn(){
  for(let size in shipsConfig){
    size = +size;
    const placedCount = placedShips.filter(s=>s.size===size).length;
    if(placedCount < shipsConfig[size]){
      info.textContent = "Поставьте все корабли";
      startGameBtn.disabled = true;
      return;
    }
  }
  info.textContent = "Все корабли расставлены";
  startGameBtn.disabled = false;
}

playerBoard.addEventListener("click", e => {
  if(!e.target.classList.contains("cell")) return;
  const idx = +e.target.dataset.index;
  placeShip(idx, selectedSize, orientation);
});

shipIconsContainer.addEventListener("click", e => {
  const icon = e.target.closest(".ship-icon");
  if(!icon || gameStarted) return;
  shipIconsContainer.querySelectorAll(".ship-icon").forEach(i=>i.classList.remove("selected"));
  icon.classList.add("selected");
  selectedSize = +icon.dataset.size;
});

document.querySelectorAll("#orientationIcons .orient-icon").forEach(icon => {
  icon.onclick = () => {
    if(gameStarted) return;
    document.querySelectorAll("#orientationIcons .orient-icon").forEach(i=>i.classList.remove("selected"));
    icon.classList.add("selected");
    orientation = icon.dataset.orient;
  }
});

// ========= Firebase Networking ===========

function saveShipsToDB() {
  if(!roomId || !playerNumber) return;
  const keyShips = playerNumber===1 ? "player1Ships" : "player2Ships";
  const keyReady = playerNumber===1 ? "ready1" : "ready2";
  const shipsData = placedShips.map(s => s.positions);
  return update(ref(db, roomId), {
    [keyShips]: shipsData,
    [keyReady]: true,
  });
}

function listenRoomChanges() {
  if(!roomId) return;
  const roomRef = ref(db, roomId);
  onValue(roomRef, snapshot => {
    const data = snapshot.val();
    if(!data) return;

    if(data.ready1 && data.ready2 && !gameStarted){
      // Загрузка кораблей соперника
      const enemyData = playerNumber === 1 ? data.player2Ships : data.player1Ships;
      if(enemyData) {
        enemyShips = enemyData.map(arr=>({positions: arr, size: arr.length, hits: []}));
        drawEnemyBoard();
      }
      gameStarted = true;
      currentPlayer = data.currentPlayer;
      info.textContent = currentPlayer === playerNumber ? "Ваш ход!" : "Ждите ход соперника...";
      startGameBtn.disabled = true;
      drawShips();
      playerBoard.querySelectorAll('.remove-ship').forEach(el => el.remove());
    }

    // Обновление ходов
    if(data.moves && data.moves.length > 0){
      const lastMove = data.moves[data.moves.length-1];
      if(lastMove.player !== playerNumber){
        applyMove(lastMove);
        currentPlayer = data.currentPlayer;
        info.textContent = currentPlayer === playerNumber ? "Ваш ход!" : "Ждите ход соперника...";
      }
    }
  });
}

function applyMove(move){
  const targetboard = move.player === 1 ? enemyBoard : playerBoard;
  const targetShips = move.player === 1 ? enemyShips : placedShips;
  const idx = move.position;
  const cell = targetboard.querySelector(`.cell[data-index="${idx}"]`);
 if(!cell) return;
  let hit = false;
  targetShips.forEach(ship => {
    if(ship.positions.includes(idx)){
      hit = true;
      if(!ship.hits.includes(idx)) ship.hits.push(idx);
    }
  });
  markShot(targetboard, idx, hit);
  if(hit) markSunkShips(targetboard, targetShips);
}

function markShot(board, idx, isHit){
  const cell = board.querySelector(`.cell[data-index="${idx}"]`);
  if(!cell) return;
  cell.classList.add(isHit ? "hit" : "miss");
  cell.style.cursor = "default";
}

function markSunkShips(board, ships){
  ships.forEach(ship => {
    if(ship.hits.length === ship.size){
      ship.positions.forEach(pos => {
        const c = board.querySelector(`.cell[data-index="${pos}"]`);
        if(c) c.style.boxShadow = "0 0 8px 3px #f00 inset"; // красная подсветка для убитого корабля
      });
    }
  });
}

function isGameOver(ships){
  return ships.every(ship => ship.hits.length === ship.size);
}

async function makeMove(position){
  if(currentPlayer !== playerNumber) return false;
  const roomRef = ref(db, roomId + "/moves");
  const roomSnapshot = await get(roomRef);
  let moves = roomSnapshot.val() || [];
  moves.push({player: playerNumber, position});
  await update(ref(db, roomId), {
    moves: moves,
    currentPlayer: playerNumber === 1 ? 2 : 1
  });
  return true;
}

enemyBoard.addEventListener("click", async (e) => {
  if(!gameStarted) return;
  if(currentPlayer !== playerNumber){
    info.textContent = "Ход соперника...";
    return;
  }
  if(!e.target.classList.containscell")) return;
  const idx = +e.target.dataset.index;
  if(e.target.classList.contains("hit") || e.target.classList.contains("miss")){
    info.textContent = "Вы стреляли сюда ранее."
    return;
  }
  const res = await makeMove(idx);
  if(res) info.textContent = "Ход сделан. Ждем соперника...";
});

// Room create/join
createRoomBtn.onclick = () => {
  roomId = "room-" + Math.random().toString(36).substr(2,6);
  roomIdInput.value = roomId;
  playerNumber = 1;
  set(ref(db, roomId), {
    player1Ships: null,
    player2Ships: null,
    moves: [],
    currentPlayer: 1,
    ready1: false,
    ready2: false
  }).then(() => roomStatus.textContent = `Создана комната ${roomId}. Вы игрок 1.`);
};
joinRoomBtn.onclick = async () => {
  const rid = roomIdInput.value.trim();
  if(!rid) {alert("Введите ID комнаты"); return;}
  const snap = await get(ref(db, rid));
  if(!snap.exists()){
    alert("Комната не найдена");
    return;
  }
  roomId = rid;
  playerNumber = 2;
  roomStatus.textContent = `Присоединились к комнате ${roomId} как игрок 2`;
  listenRoomChanges();
};

// Start game
startGameBtn.onclick = async () => {
  if(!roomId || !playerNumber){ alert("Создайте или присоединитесь к комнате"); return; }
  if(placedShips.length===0){ alert("Расставьте корабли"); return;}
  await saveShipsToDB();
  listenRoomChanges();
  info.textContent = "Ждем соперника...";
};

function drawEnemyBoard(){
  enemyBoard.querySelectorAll(".cell").forEach(c => {
    c.classList.remove("hit","miss");
    c.style.cursor = "pointer";
    c.style.boxShadow = "";
  });
}

// Инициализация
createShipIcons();
updateCounts();
updateStartBtn();
</script>

</body>
</html>
